# Railway config for the CloneLM FRONTEND service.
#
# Set the service's Root Directory to "frontend" in the Railway UI so this file is
# detected and the Node/Vite app is found here (not the monorepo root).
#
# No `builder` is set on purpose: Railway's default builder (Railpack) auto-detects
# the Node app. Set VITE_API_BASE (the backend's public URL) as a BUILD-TIME service
# variable — Vite inlines it into the bundle, so changing it later needs a redeploy.

[build]
buildCommand = "npm run build"

[deploy]
# `serve` is a runtime dependency (see package.json); -s gives SPA fallback so
# client-side routes resolve to index.html. Railway injects $PORT.
startCommand = "npx serve -s dist -l $PORT"
restartPolicyType = "ON_FAILURE"
