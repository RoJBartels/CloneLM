# Railway config for the CloneLM FRONTEND service.
# Create a Railway service with Root Directory = "frontend"; Railway reads this
# file from that root. Nixpacks detects the Node/Vite app, runs the build, and
# serves the static bundle.
#
# IMPORTANT: set VITE_API_BASE (the backend's public URL) as a service variable
# BEFORE building — Vite inlines it into the bundle at build time, so changing it
# later requires a redeploy.
[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# `serve` is a runtime dependency (see package.json); -s gives SPA fallback so
# client-side routes resolve to index.html. Railway injects $PORT.
startCommand = "npx serve -s dist -l $PORT"
restartPolicyType = "ON_FAILURE"
